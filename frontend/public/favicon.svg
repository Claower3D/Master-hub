<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cf2c7" />
      <stop offset="50%" stop-color="#5b8cff" />
      <stop offset="100%" stop-color="#b388ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle with tech markings -->
  <circle cx="256" cy="256" r="230" fill="#0b1020" stroke="url(#cyber-grad)" stroke-width="12" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(124, 242, 199, 0.15)" stroke-width="2" stroke-dasharray="10 15" />
  
  <!-- Stylized Monogram M and H -->
  <path d="M 130 350 L 130 162 L 210 260 L 256 210 L 302 260 L 382 162 L 382 350" 
        fill="none" 
        stroke="url(#cyber-grad)" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Horizontal bar for H -->
  <path d="M 290 280 L 382 280" 
        fill="none" 
        stroke="url(#cyber-grad)" 
        stroke-width="32" 
        stroke-linecap="round" 
        filter="url(#glow)" />
        
  <!-- Small dot under the logo for tech balance -->
  <circle cx="256" cy="385" r="12" fill="#7cf2c7" filter="url(#glow)" />
</svg>