<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cf2c7" />
      <stop offset="50%" stop-color="#5b8cff" />
      <stop offset="100%" stop-color="#b388ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle with tech markings -->
  <circle cx="256" cy="256" r="230" fill="#0b1020" stroke="url(#cyber-grad)" stroke-width="12" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(124, 242, 199, 0.15)" stroke-width="2" stroke-dasharray="10 15" />

  <!-- H letter (left side) -->
  <!-- Left vertical bar of H -->
  <path d="M 120 165 L 120 350"
        fill="none"
        stroke="url(#cyber-grad)"
        stroke-width="32"
        stroke-linecap="round"
        filter="url(#glow)" />
  <!-- Right vertical bar of H -->
  <path d="M 230 165 L 230 350"
        fill="none"
        stroke="url(#cyber-grad)"
        stroke-width="32"
        stroke-linecap="round"
        filter="url(#glow)" />
  <!-- Horizontal crossbar of H -->
  <path d="M 120 260 L 230 260"
        fill="none"
        stroke="url(#cyber-grad)"
        stroke-width="32"
        stroke-linecap="round"
        filter="url(#glow)" />

  <!-- M letter (right side) -->
  <!-- Left vertical of M -->
  <path d="M 265 350 L 265 165 L 338 290 L 410 165 L 410 350"
        fill="none"
        stroke="url(#cyber-grad)"
        stroke-width="32"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- Small dot under the logo for tech balance -->
  <circle cx="256" cy="400" r="10" fill="#7cf2c7" filter="url(#glow)" />
</svg>
